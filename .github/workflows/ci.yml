name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
          restore-keys: lake-

      - name: Cache crypto-ffi build
        uses: actions/cache@v4
        with:
          path: crypto-ffi/target
          key: crypto-ffi-${{ hashFiles('crypto-ffi/Cargo.toml', 'crypto-ffi/Cargo.lock', 'crypto-ffi/src/**') }}
          restore-keys: crypto-ffi-

      - name: Build crypto-ffi
        run: cd crypto-ffi && cargo build --release

      - name: Run tests
        run: make test

  genesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for genesis-replay.sh

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-genesis-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build genesis tools
        run: lake build genesis_select_targets genesis_evaluate genesis_check_merge genesis_finalize genesis_validate

      - name: Smoke test CLI tools
        run: |
          echo '{"prId":1,"prCreatedAt":9999999999,"indices":[]}' | .lake/build/bin/genesis_select_targets | jq -e '.targets == []'
          echo '{"indices":[]}' | .lake/build/bin/genesis_finalize | jq -e '.weights[0].id == "sorpaas"'
          echo '{"reviews":[],"metaReviews":[],"indices":[]}' | .lake/build/bin/genesis_check_merge | jq -e '.ready == false'

      - name: Verify genesis history
        run: |
          bash tools/genesis-replay.sh --verify
          bash tools/genesis-replay.sh --verify-cache
